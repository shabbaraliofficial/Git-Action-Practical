<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DevOps CI/CD Demo</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <header class="header">
    <h1>🚀 DevOps CI/CD Pipeline</h1>
    <p>GitHub Actions | Docker | Kubernetes</p>
  </header>

  <section class="card-container">
    <div class="card">
      <h2>📦 GitHub</h2>
      <p>Code pushed to repository</p>
    </div>

    <div class="card">
      <h2>⚙️ CI/CD</h2>
      <p>GitHub Actions build & test</p>
    </div>

    <div class="card">
      <h2>🐳 Docker</h2>
      <p>Image built & pushed to DockerHub</p>
    </div>

    <div class="card">
      <h2>☸️ Kubernetes</h2>
      <p>App deployed to cluster</p>
    </div>
  </section>

  <footer class="footer">
    <p>🔥 Built by Bhai | DevOps Project</p>
  </footer>

</body>
</html>
